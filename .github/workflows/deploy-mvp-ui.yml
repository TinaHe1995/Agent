name: Deploy MVP UI to GitHub Pages

on:
  push:
    branches: [main, cursor/mvp-ui-prototype-f8d7]
    paths:
      - "prototype/mvp-ui/**"
      - ".github/workflows/deploy-mvp-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "mvp-ui-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: prototype/mvp-ui/package-lock.json

      - name: Install and build
        working-directory: prototype/mvp-ui
        env:
          VITE_BASE_PATH: /Agent/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/mvp-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
